<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية دراستي VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #F5F0E8;
            --gold: #C9A84C;
            --black: #1C1C2E;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, #EDE8DF 100%);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--white);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(28, 28, 46, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--black);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .link-card {
            background: linear-gradient(135deg, var(--cream) 0%, #FAFAF8 100%);
            border: 2px solid #EDE8DF;
            border-radius: 15px;
            padding: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 8px 20px rgba(201, 168, 76, 0.2);
        }

        .link-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: block;
        }

        .link-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 8px;
            display: block;
        }

        .link-desc {
            font-size: 0.85rem;
            color: #A09880;
            display: block;
        }

        .footer {
            border-top: 2px solid #EDE8DF;
            padding-top: 20px;
            color: #A09880;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎓</div>
        <h1>أكاديمية دراستي VIP</h1>
        <p class="subtitle">منصة تعليمية عمانية متكاملة</p>

        <div class="links-grid">
            <a href="drasati-vip.html" class="link-card">
                <span class="link-icon">👤</span>
                <span class="link-title">الطالب</span>
                <span class="link-desc">بوابة الطالب والتسجيل</span>
            </a>

            <a href="drasati-admin.html" class="link-card">
                <span class="link-icon">👨‍💼</span>
                <span class="link-title">المدير</span>
                <span class="link-desc">لوحة إدارة المنصة</span>
            </a>

            <a href="drasati-cs.html" class="link-card">
                <span class="link-icon">💬</span>
                <span class="link-title">خدمة العملاء</span>
                <span class="link-desc">إدارة الطلاب والرسائل</span>
            </a>

            <a href="drasati-teacher.html" class="link-card">
                <span class="link-icon">👨‍🏫</span>
                <span class="link-title">المعلم</span>
                <span class="link-desc">بوابة إدارة الدروس</span>
            </a>
        </div>

        <div class="footer">
            <p>© 2025 أكاديمية دراستي VIP — جميع الحقوق محفوظة</p>
        </div>
    </div>
</body>
</html>
