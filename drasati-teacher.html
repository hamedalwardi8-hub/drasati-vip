<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة المعلم — دراستي VIP</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-dark:#8B6914;--gl:rgba(201,168,76,.12);--deep:#0A0A0F;--deep2:#12121A;--sur:#1C1C2A;--sur2:#242436;--white:#F5F3EE;--mut:rgba(245,243,238,.62);--faint:rgba(245,243,238,.08);--teal:#2DD4BF;--red:#F87171;--blue:#60A5FA;--r:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:var(--deep);color:var(--white);min-height:100vh;}
/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(201,168,76,.06),transparent);}
.lcard{background:var(--sur);border:1px solid rgba(201,168,76,.2);border-radius:22px;padding:44px 38px;width:100%;max-width:400px;text-align:center;}
.llogo{width:54px;height:54px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;font-size:26px;font-weight:900;color:var(--deep);margin:0 auto 18px;box-shadow:0 0 30px rgba(201,168,76,.3);}
.ltitle{font-family:'Cairo',sans-serif;font-size:24px;font-weight:900;margin-bottom:5px;}
.lsub{font-size:13px;color:var(--mut);margin-bottom:28px;}
.inp{width:100%;background:var(--deep2);border:1.5px solid var(--faint);border-radius:10px;padding:12px 14px;color:var(--white);font-size:14px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s;margin-bottom:12px;}
.inp:focus{border-color:var(--gold);}
.inp::placeholder{color:rgba(245,243,238,.28);}
.btn-g{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--deep);padding:13px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;box-shadow:0 4px 20px rgba(201,168,76,.3);transition:transform .2s;}
.btn-g:hover{transform:translateY(-2px);}
.err{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:9px;padding:9px 13px;font-size:13px;margin-bottom:12px;display:none;}
/* DASH */
.dash{display:none;min-height:100vh;flex-direction:column;}
.dash.show{display:flex;}
.topbar{background:var(--deep2);border-bottom:1px solid var(--faint);padding:14px 28px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.tlogo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;color:var(--deep);}
.tlogo img{height:40px;width:auto;object-fit:contain;}
.tbrand{font-size:15px;font-weight:700;}.tbrand span{color:var(--gold);}
.trole{font-size:12px;background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.25);padding:3px 11px;border-radius:20px;}
.tright{margin-right:auto;display:flex;align-items:center;gap:10px;}
.tname{font-size:13px;color:var(--mut);}
.tav{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Cairo',sans-serif;font-size:13px;font-weight:900;color:var(--deep);}
.tbtn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;}
/* LAYOUT */
.layout{display:flex;flex:1;}
.sidebar{width:200px;background:var(--deep2);border-left:1px solid var(--faint);padding:18px 10px;flex-shrink:0;display:flex;flex-direction:column;gap:3px;}
.ni{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--mut);transition:all .2s;border:none;background:none;width:100%;text-align:right;font-family:'Tajawal',sans-serif;}
.ni:hover{background:var(--faint);color:var(--white);}
.ni.active{background:var(--gl);color:var(--gold);font-weight:600;}
.ni svg{width:16px;height:16px;flex-shrink:0;}
.nd{height:1px;background:var(--faint);margin:6px 0;}
.content{flex:1;padding:24px;overflow-y:auto;}
/* CARDS */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.scard{background:var(--sur);border:1px solid var(--faint);border-radius:var(--r);padding:16px;}
.scard.g{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.07);}
.scard.t{border-color:rgba(45,212,191,.3);background:rgba(45,212,191,.06);}
.sn{font-family:'Cairo',sans-serif;font-size:26px;font-weight:900;color:var(--gold);}
.scard.t .sn{color:var(--teal);}
.sl{font-size:11px;color:var(--mut);margin-top:3px;}
/* TABLE */
.twrap{background:var(--sur);border:1px solid var(--faint);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.thead2{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--faint);}
.ttitle{font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:var(--sur2);padding:10px 14px;text-align:right;font-size:11px;font-weight:700;color:var(--mut);}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--faint);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.b-act{background:rgba(45,212,191,.12);color:var(--teal);}
.b-pend{background:rgba(248,180,0,.1);color:#F8B400;}
.spill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.sp-ex{background:rgba(45,212,191,.12);color:var(--teal);}
.sp-gd{background:var(--gl);color:var(--gold);}
.sp-wk{background:rgba(248,113,113,.1);color:var(--red);}
/* FORM */
.form-section{background:var(--sur);border:1px solid var(--faint);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.fs-title{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.fs-sub{font-size:12px;color:var(--mut);margin-bottom:16px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.frow1{margin-bottom:12px;}
.flabel{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:6px;display:block;}
.finp{width:100%;background:var(--deep2);border:1px solid var(--faint);border-radius:9px;padding:10px 13px;color:var(--white);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s;}
.finp:focus{border-color:var(--gold);}
.finp::placeholder{color:rgba(245,243,238,.25);}
.fsel{width:100%;background:var(--deep2);border:1px solid var(--faint);border-radius:9px;padding:10px 13px;color:var(--white);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;}
.fsel option{background:var(--deep2);}
.btn-add{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--deep);padding:10px 22px;border-radius:9px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;transition:transform .2s;}
.btn-add:hover{transform:translateY(-1px);}
.btn-del{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;}
.btn-del:hover{background:rgba(248,113,113,.2);}
.hint{font-size:11px;color:var(--mut);margin-top:6px;display:flex;align-items:center;gap:5px;}
/* CONTENT ITEMS */
.ci{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--faint);}
.ci:last-child{border-bottom:none;}
.ci-icon{font-size:20px;flex-shrink:0;}
.ci-info{flex:1;}
.ci-title{font-size:13px;font-weight:600;}
.ci-meta{font-size:11px;color:var(--mut);margin-top:2px;}
.ci-link{font-size:11px;color:var(--teal);direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
/* TODAY LINK */
.today-card{background:linear-gradient(135deg,rgba(201,168,76,.12),rgba(45,212,191,.08));border:1.5px solid rgba(201,168,76,.3);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.tc-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.tc-slots{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.tc-slot{background:var(--deep2);border:1px solid var(--faint);border-radius:10px;padding:14px;}
.tc-time{font-size:11px;color:var(--gold);background:var(--gl);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:10px;}
.tc-current{font-size:12px;color:var(--mut);margin-bottom:8px;}
.tc-inp{width:100%;background:var(--sur);border:1.5px solid var(--faint);border-radius:8px;padding:9px 12px;color:var(--white);font-size:12px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .2s;direction:ltr;margin-bottom:8px;}
.tc-inp:focus{border-color:var(--gold);}
.tc-inp::placeholder{color:rgba(245,243,238,.25);direction:rtl;}
/* MODAL */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .25s;}
.mo.show{opacity:1;pointer-events:all;}
.mc{background:var(--sur);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:28px;width:100%;max-width:380px;text-align:center;transform:translateY(14px);transition:transform .25s;}
.mo.show .mc{transform:translateY(0);}
.mi{font-size:42px;margin-bottom:12px;}
.mt{font-family:'Cairo',sans-serif;font-size:18px;font-weight:900;margin-bottom:8px;}
.md{font-size:13px;color:var(--mut);line-height:1.7;margin-bottom:22px;}
.mbtns{display:flex;gap:8px;}
.mbtns button{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;border:none;}
.mb-g{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--deep);}
.mb-s{background:var(--faint);color:var(--white);}
/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--sur2);border:1px solid rgba(201,168,76,.3);color:var(--white);padding:10px 20px;border-radius:100px;font-size:13px;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
/* EMPTY */
.empty{text-align:center;padding:36px;color:var(--mut);font-size:13px;}
@media(max-width:700px){.sidebar{display:none;}.sum-grid{grid-template-columns:1fr 1fr;}.frow{grid-template-columns:1fr;}.tc-slots{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBcj-6Fvtk2oyxvTnFJayYJLlgZesKckxs",
  authDomain: "drasati-vip.firebaseapp.com",
  projectId: "drasati-vip",
  storageBucket: "drasati-vip.firebasestorage.app",
  messagingSenderId: "500718965745",
  appId: "1:500718965745:web:d4ba21467e00714902aa50"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
window.fbFuncs = { doc, getDoc, setDoc, collection, getDocs };
window.firebaseReady = true;
window.dispatchEvent(new Event('firebase-ready'));
</script>

<script>
// ── TEACHERS DB ──
// بيانات المعلمين بدون كلمات المرور (الكلمات تُقرأ من Firebase فقط)
const TEACHERS = {
  'math_low':    {name:'أ. خالد الحارثي',   subject:'الرياضيات',    grades:['الصف الخامس','الصف السادس','الصف السابع','الصف الثامن'],    icon:'🔢'},
  'math_high':   {name:'أ. ماجد السعدي',    subject:'الرياضيات',    grades:['الصف التاسع','الصف العاشر'],                                  icon:'🔢'},
  'science':     {name:'أ. سارة المعمرية',  subject:'العلوم',        grades:['الصف الخامس','الصف السادس','الصف السابع','الصف الثامن'],    icon:'🔬'},
  'physics':     {name:'أ. عمر الكيومي',    subject:'الفيزياء',      grades:['الصف التاسع','الصف العاشر'],                                  icon:'⚡'},
  'chemistry':   {name:'أ. نورة الفارسية',  subject:'الكيمياء',      grades:['الصف التاسع','الصف العاشر'],                                  icon:'🧪'},
  'biology':     {name:'أ. ليلى الشيدية',   subject:'الأحياء',       grades:['الصف التاسع','الصف العاشر'],                                  icon:'🌿'},
  'arabic_low':  {name:'أ. فاطمة البلوشية', subject:'اللغة العربية', grades:['الصف الخامس','الصف السادس','الصف السابع','الصف الثامن'],    icon:'📖'},
  'arabic_high': {name:'أ. سلطان الغافري',  subject:'اللغة العربية', grades:['الصف التاسع','الصف العاشر'],                                  icon:'📖'},
  'english':     {name:'أ. أحمد الرحبي',    subject:'اللغة الإنجليزية',grades:['الصف الخامس','الصف السادس','الصف السابع','الصف الثامن','الصف التاسع','الصف العاشر'],icon:'🌍'},
  'islamic_low': {name:'أ. راشد النبهاني',  subject:'التربية الإسلامية',grades:['الصف الخامس','الصف السادس','الصف السابع'],               icon:'☪️'},
  'islamic_high':{name:'أ. يوسف الكندي',    subject:'التربية الإسلامية',grades:['الصف الثامن','الصف التاسع','الصف العاشر'],               icon:'☪️'},
  'social_low':  {name:'أ. مريم الزدجالية', subject:'الدراسات الاجتماعية',grades:['الصف الخامس','الصف السادس','الصف السابع'],            icon:'🗺️'},
  'social_high': {name:'أ. هلال الحسني',    subject:'الدراسات الاجتماعية',grades:['الصف الثامن','الصف التاسع','الصف العاشر'],            icon:'🗺️'},
};

let CT = null; // current teacher
let CK = null; // current teacher key
let TEACHERS_PASSES = {}; // حفظ كلمات مرور المعلمين من Firebase

// Firebase Functions
async function getTeacherPassFromDB(teacherId) {
  try {
    const docSnap = await window.fbFuncs.getDoc(window.fbFuncs.doc(window.db, 'teachers', teacherId));
    return docSnap.exists() ? docSnap.data().password : TEACHERS[teacherId]?.pass || null;
  } catch {
    return TEACHERS[teacherId]?.pass || null;
  }
}

async function saveTeacherPassToDB(teacherId, pass) {
  try {
    const docSnap = await window.fbFuncs.getDoc(window.fbFuncs.doc(window.db, 'teachers', teacherId));
    const data = docSnap.exists() ? docSnap.data() : {};
    await window.fbFuncs.setDoc(window.fbFuncs.doc(window.db, 'teachers', teacherId), {
      ...data,
      password: pass,
      updatedAt: new Date().toISOString()
    });
  } catch (e) {
    console.log('Firebase not ready:', e);
  }
}

// Load all teacher passwords from Firebase on startup
window.addEventListener('firebase-ready', async () => {
  try {
    const querySnapshot = await window.fbFuncs.getDocs(window.fbFuncs.collection(window.db, 'teachers'));
    querySnapshot.forEach((doc) => {
      TEACHERS_PASSES[doc.id] = doc.data().password || TEACHERS[doc.id]?.pass;
    });
  } catch (e) {
    console.log('Firebase not ready:', e);

});

// Firebase function to get teacher's students
async function getTeacherStudents(teacherGrades) {
  try {
    const querySnapshot = await window.fbFuncs.getDocs(window.fbFuncs.collection(window.db, 'students'));
    const students = [];
    querySnapshot.forEach((doc) => {
      const student = doc.data();
      if (student.grade && teacherGrades.includes(student.grade)) {
        students.push(student);
      }
    });
    return students;
  } catch (e) {
    console.log('Firebase error:', e);
    return [];
  }
}

// Update teacher student stats
async function updateTeacherStats() {
  if (!CT || !CT.grades) return;
  const students = await getTeacherStudents(CT.grades);
  const active = students.filter(s => s.status === 'active').length;
  const pending = students.filter(s => s.status === 'pending').length;
  document.getElementById('t-total').textContent = students.length;
  document.getElementById('t-active').textContent = active;
  document.getElementById('t-pending').textContent = pending;
}

async function doLogin(){
  const user = document.getElementById('l-user').value.trim().toLowerCase();
  const pass = document.getElementById('l-pass').value;
  const err  = document.getElementById('lerr');
  const t = TEACHERS[user];

  if(!t){
    err.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    err.style.display = 'block';
    return;
  }

  // الحصول على كلمة المرور من Firebase فقط (آمن - بدون كلمات في الكود)
  const teacherPass = TEACHERS_PASSES[user];

  if(teacherPass !== pass){
    err.textContent = 'اسم المستخدم أو كلمة المرور غير صحيحة';
    err.style.display = 'block';
    return;
  }

  CT = t; CK = user;
  err.style.display = 'none';
  document.getElementById('lw').style.display = 'none';
  document.getElementById('dash').classList.add('show');
  document.getElementById('t-name').textContent = t.name;
  document.getElementById('t-av').textContent   = t.name[3] || 'أ';

  await updateTeacherStats();
  nav('home');

            ${gs.map((s,i)=>{
              const cnt=(scores[s.id]||[]).filter(sc=>sc.subject===CT.subject).length;
              return `<tr>
                <td>${i+1}</td>
                <td><strong>${s.name}</strong></td>
                <td style="direction:ltr">${s.parent}</td>
                <td style="direction:ltr">${s.student||'—'}</td>
                <td style="font-size:11px;direction:ltr">${s.email}</td>
                <td><span class="badge ${cnt>0?'b-act':'b-pend'}">${cnt} اختبار</span></td>
                <td><button onclick="openWA('${s.parent}','${s.name}')" style="background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.2);padding:5px 11px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'Tajawal',sans-serif;">واتساب</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        </div>
      </div>`;
    }).join('')}
  `;
}

function openWA(phone,name){
  window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${encodeURIComponent(`السلام عليكم ${name}، معك ${CT.name} من أكاديمية دراستي VIP`)}`, '_blank');
}

// ── SCORES ──
function renderScores(){
  const myStudents=getStudents().filter(s=>CT.grades.includes(s.grade)&&s.status==='active');
  const allScores=getScores();
  const gradeOpts=CT.grades.map(g=>`<option>${g}</option>`).join('');
  const subjectStudents=myStudents.map(s=>({...s,scores:(allScores[s.id]||[]).filter(sc=>sc.subject===CT.subject)}));

  return `
    <div class="form-section">
      <div class="fs-title">📝 إضافة درجة اختبار</div>
      <div class="fs-sub">أضف نتيجة طالب بعد انتهاء الاختبار</div>
      <div class="frow">
        <div><label class="flabel">الطالب</label>
          <select class="fsel" id="sc-st">
            <option value="">اختر الطالب</option>
            ${myStudents.map(s=>`<option value="${s.id}">${s.name} — ${s.grade}</option>`).join('')}
          </select>
        </div>
        <div><label class="flabel">الاختبار</label><input class="finp" id="sc-exam" placeholder="مثال: اختبار الوحدة 1"></div>
      </div>
      <div class="frow">
        <div><label class="flabel">الدرجة</label><input class="finp" id="sc-score" type="number" min="0" max="10" placeholder="من 10"></div>
        <div><label class="flabel">الوحدة</label><input class="finp" id="sc-unit" placeholder="الوحدة 1"></div>
      </div>
      <button class="btn-add" onclick="addScore()">إضافة الدرجة ✓</button>
    </div>

    ${CT.grades.map(g=>{
      const gs=subjectStudents.filter(s=>s.grade===g);
      if(!gs.length) return '';
      return `<div class="twrap" style="margin-bottom:14px">
        <div class="thead2"><div class="ttitle">${g} — ${CT.subject}</div></div>
        <div style="overflow-x:auto">
        <table>
          <thead><tr><th>اسم الطالب</th><th>الاختبار</th><th>الدرجة</th><th>التقدير</th><th>التاريخ</th></tr></thead>
          <tbody>
            ${gs.flatMap(s=>s.scores.length?s.scores.map(sc=>`<tr>
              <td><strong>${s.name}</strong></td>
              <td>${sc.exam}</td>
              <td><strong style="color:${sc.score>=8?'var(--teal)':sc.score>=5?'var(--gold)':'var(--red)'}">${sc.score}/10</strong></td>
              <td><span class="spill ${sc.score>=8?'sp-ex':sc.score>=5?'sp-gd':'sp-wk'}">${sc.score>=9?'ممتاز 🌟':sc.score>=8?'جيد جداً':sc.score>=6?'جيد':sc.score>=5?'مقبول':'يحتاج تحسين'}</span></td>
              <td style="font-size:11px;color:var(--mut)">${sc.date}</td>
            </tr>`):[`<tr><td><strong>${s.name}</strong></td><td colspan="4" style="color:var(--mut)">لا توجد درجات بعد</td></tr>`]).join('')}
          </tbody>
        </table>
        </div>
      </div>`;
    }).join('')}
  `;
}

function addScore(){
  const sid=document.getElementById('sc-st').value;
  const exam=document.getElementById('sc-exam').value.trim();
  const score=document.getElementById('sc-score').value;
  const unit=document.getElementById('sc-unit').value.trim()||'عام';
  if(!sid||!exam||score===''){ showToast('أكمل جميع الحقول'); return; }
  const all=getScores();
  if(!all[sid]) all[sid]=[];
  all[sid].push({subject:CT.subject,exam,score:parseFloat(score),unit,date:new Date().toLocaleDateString('ar-OM'),teacher:CT.name});
  saveScores(all);
  showToast('✓ تمت إضافة الدرجة');
  nav('scores');
}

    <div class="form-section">

    <div class="form-section">

      <div class="fs-sub">هذه المعلومات لا يمكن تغييرها</div>

        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--faint);">

        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--faint);">
          <span style="font-size:13px;color:var(--mut)">الصفوف المسؤول عنها</span>
          <span style="font-size:13px;font-weight:600">${CT.grades.join(' · ')}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;">
          <span style="font-size:13px;color:var(--mut)">اسم المستخدم</span>
          <span style="font-size:13px;font-weight:600;color:var(--gold)">${CK}</span>
        </div>
      </div>
    </div>
  `;
}

function getTeacherProfile(key){
  const profiles = JSON.parse(localStorage.getItem('drasati_teacher_profiles')||'{}');
  return profiles[key] || {};
}

async function saveTeacherSettings(){
  const newName    = document.getElementById('set-name').value.trim();
  const oldPass    = document.getElementById('set-oldpass').value;
  const newPass    = document.getElementById('set-newpass').value;
  const confirmPass= document.getElementById('set-confirmpass').value;

  // Verify old password (من Firebase فقط - آمن)
  const profiles = JSON.parse(localStorage.getItem('drasati_teacher_profiles')||'{}');
  const currentPass = TEACHERS_PASSES[CK];
  if(!currentPass || oldPass !== currentPass){ showToast('❌ كلمة المرور الحالية غير صحيحة'); return; }

  // Validate new password if provided
  if(newPass && newPass !== confirmPass){ showToast('❌ كلمة المرور الجديدة غير متطابقة'); return; }
  if(newPass && newPass.length < 6){ showToast('❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

  const oldName = profiles[CK]?.name || CT.name;
  const changes = [];
  if(newName !== oldName) changes.push(`الاسم: "${oldName}" ← "${newName}"`);
  if(newPass) changes.push('كلمة المرور: تم التغيير');

  if(!changes.length){ showToast('لا يوجد تغييرات'); return; }

  // Save (بدون حفظ كلمات مرور في localStorage - كل كلمات المرور من Firebase فقط)
  if(!profiles[CK]) profiles[CK] = {};
  profiles[CK].name = newName;
  if(newPass) {
    TEACHERS_PASSES[CK] = newPass;
    await saveTeacherPassToDB(CK, newPass);
  }
  profiles[CK].lastChanged = new Date().toLocaleString('ar-OM');
  profiles[CK].subject = CT.subject;
  profiles[CK].grades  = CT.grades;
  localStorage.setItem('drasati_teacher_profiles', JSON.stringify(profiles));

  // Save notification for admin
  const notifs = JSON.parse(localStorage.getItem('drasati_teacher_notifs')||'[]');
  notifs.unshift({
    teacherKey: CK,
    teacherName: newName,
    subject: CT.subject,
    changes: changes.join(' | '),
    time: new Date().toLocaleString('ar-OM'),
    read: false
  });
  localStorage.setItem('drasati_teacher_notifs', JSON.stringify(notifs));

  // Update UI
  CT.name = newName;
  document.getElementById('t-name').textContent = newName;
  document.getElementById('t-av').textContent   = newName[3] || 'أ';

  showToast('✓ تم حفظ التغييرات وإشعار المدير');
  nav('settings');
}

// ── UTILS ──
let _mcbs=[];
function showModal(icon,title,desc,btns){
  document.getElementById('m-icon').textContent=icon;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-desc').textContent=desc;
  _mcbs=btns;
  document.getElementById('m-btns').innerHTML=btns.map((b,i)=>`<button class="${b.c}" onclick="_mcbs[${i}].f()">${b.l}</button>`).join('');
  document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
